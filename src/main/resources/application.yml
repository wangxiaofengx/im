server:
  port: 9900
  ssl:
    key-store: classpath:keystore.jks
    key-store-password: 123456
    key-alias: tomcat
logging:
  level:
    root: info
  file:
    name: logs/video-conference-manager.log
spring:
  mvc:
    async:
      request-timeout: -1
ice:
  stun-server-url: https://raw.githubusercontent.com/pradt2/always-online-stun/master/valid_hosts.txt
  enable: false
